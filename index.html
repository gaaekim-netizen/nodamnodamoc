<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오션중 노담해 포토부스</title>
    <style>
        body { 
            margin: 0; 
            background: #0f4c75; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            color: white; 
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            max-width: 500px;
        }
        #start-btn { 
            padding: 20px 40px; 
            font-size: 24px; 
            font-weight: bold; 
            background: #3282b8; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 999; 
            margin-bottom: 20px;
            position: relative;
        }
        #start-btn:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        #countdown { 
            display: none; 
            font-size: 140px; 
            font-weight: bold; 
            position: absolute; 
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999 !important; /* 초읽기가 무조건 맨 앞 레이어 */
            text-shadow: 4px 4px 20px rgba(0,0,0,1); 
            color: #ffcc00;
            pointer-events: none;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            background: #000;
            z-index: 1;
        }
        #camera-view { 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        #preview-container { 
            display: none; 
            position: relative; 
            width: 320px; 
            height: 480px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            z-index: 10;
        }
        #result-canvas { 
            width: 100%; 
            height: 100%; 
        }
        #print-btn { 
            display:none; 
            margin-top: 20px; 
            padding: 15px 30px; 
            font-size: 20px; 
            background: #e84545; 
            color:white; 
            border:none; 
            border-radius:10px; 
            cursor:pointer; 
            z-index: 999; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <button id="start-btn" onclick="startPhotoBooth()" disabled>📸 카메라 준비 중...</button>
        <div id="countdown"></div>
        
        <div class="video-wrapper" id="video-box">
            <video id="camera-view" autoplay playsinline webkit-playsinline></video>
        </div>
        
        <div id="preview-container">
            <canvas id="result-canvas" width="1200" height="1800"></canvas>
        </div>
        <button id="print-btn" onclick="window.print()">🖨️ 바로 인쇄하기</button>
    </div>

    <script>
        const video = document.getElementById('camera-view');
        const videoBox = document.getElementById('video-box');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const printBtn = document.getElementById('print-btn');
        const previewContainer = document.getElementById('preview-container');
        
        let shots = [];
        let shotCount = 0;
        const frameImg = new Image();
        frameImg.src = 'frame.png';

        // 갤럭시 탭 카메라 연동 최적화
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } } })
            .then(stream => { 
                video.srcObject = stream; 
                video.onloadedmetadata = () => {
                    video.play();
                    // 카메라가 정상적으로 완전히 켜지면 버튼 활성화 및 문구 변경
                    startBtn.disabled = false;
                    startBtn.innerText = "📸 촬영 시작하기";
                };
            })
            .catch(err => { 
                alert("카메라 권한을 허용해주세요."); 
                startBtn.innerText = "❌ 카메라 연결 실패";
            });

        function startPhotoBooth() {
            startBtn.classList.add('hidden');
            shots = [];
            shotCount = 0;
            takeNextShot();
        }

        function takeNextShot() {
            if (shotCount < 4) {
                let count = 3;
                countdownEl.style.display = 'block';
                countdownEl.innerText = count;
                
                // 안드로이드 크롬 크래시 방지용 타이머 안정화
                const timer = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(timer);
                        countdownEl.style.display = 'none';
                        capture();
                        shotCount++;
                        // 다음 사진 촬영으로 부드럽게 넘어가도록 딜레이 조정
                        setTimeout(takeNextShot, 1200);
                    } else {
                        countdownEl.innerText = count;
                    }
                }, 1000);
            } else {
                drawPhotos();
            }
        }

        function capture() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;
            tempCanvas.height = 480;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.translate(640, 0);
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(video, 0, 0, 640, 480);
            shots.push(tempCanvas);
        }

        function drawPhotos() {
            videoBox.classList.add('hidden');
            previewContainer.style.display = 'block';
            printBtn.style.display = 'block';

            ctx.drawImage(frameImg, 0, 0, 1200, 1800);

            const positions = [
                {x: 80, y: 80},
                {x: 620, y: 80},
                {x: 80, y: 750},
                {x: 620, y: 750}
            ];

            shots.forEach((shot, index) => {
                if(positions[index]) {
                    ctx.drawImage(shot, 70, 0, 500, 480, positions[index].x, positions[index].y, 500, 620);
                }
            });
        }
    </script>
</body>
</html>
